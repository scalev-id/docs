name: Notify nexus-mcp

# Whenever the developer docs on main change, ping the
# scalevcom/nexus-mcp repository so its Sync Catalogs workflow can
# regenerate src/generated/docsCatalog.ts immediately instead of waiting
# for its hourly cron. This keeps the bundled get_docs tool and the
# live docs.scalev.com content in lock-step.
#
# Requires repo secret NEXUS_MCP_DISPATCH_TOKEN: a fine-grained personal
# access token with `Actions: Read and write` permission on
# scalevcom/nexus-mcp (and only that repo).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notify-nexus-mcp
  cancel-in-progress: false

jobs:
  notify:
    name: Dispatch sibling-source-updated to scalevcom/nexus-mcp
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.NEXUS_MCP_DISPATCH_TOKEN }}
          repository: scalevcom/nexus-mcp
          event-type: sibling-source-updated
          client-payload: |
            {
              "source_repository": "scalevcom/docs",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}",
              "source_commit_message": ${{ toJSON(github.event.head_commit.message) }}
            }
